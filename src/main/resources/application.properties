spring.application.name=manga-panel-downloader

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mangapanel}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (needed to migrate panel data from OID to bytea)
spring.flyway.baseline-on-migrate=true

# Storage for downloaded panels
app.storage.path=${STORAGE_PATH:./data/panels}

# Image quality: data = original, data-saver = compressed
manga.source.download.quality=${MANGA_SOURCE_QUALITY:data-saver}

# Force HTTPS port 443 for at-home (useful when mangadex.org is blocked at DNS level)
manga.source.force-port-443=${MANGA_SOURCE_FORCE_PORT_443:false}
