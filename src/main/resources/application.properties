spring.application.name=manga-panel-downloader

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mangapanel}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (needed to migrate panel data from OID to bytea)
spring.flyway.baseline-on-migrate=true

spring.data.web.pageable.default-page-size=20

# HTTP client defaults
app.http.max-in-memory-bytes=${HTTP_MAX_IN_MEMORY_BYTES:10485760}
app.http.user-agent=${HTTP_USER_AGENT:MangaPanelDownloader/1.0 (portfolio project)}

# Async download executor
app.download-executor.core-pool-size=${DOWNLOAD_EXECUTOR_CORE_POOL_SIZE:2}
app.download-executor.max-pool-size=${DOWNLOAD_EXECUTOR_MAX_POOL_SIZE:4}
app.download-executor.queue-capacity=${DOWNLOAD_EXECUTOR_QUEUE_CAPACITY:16}
app.download-executor.thread-name-prefix=${DOWNLOAD_EXECUTOR_THREAD_NAME_PREFIX:download-}

# CORS configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://frontend:4200}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,DELETE,PUT,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}

# MangaDex client configuration
manga.source.download-quality=${MANGA_SOURCE_QUALITY:data-saver}
manga.source.force-port-443=${MANGA_SOURCE_FORCE_PORT_443:false}

manga.source.api.base-url=${MANGA_SOURCE_API_BASE_URL:https://api.mangadex.org}
manga.source.api.network-base-url=${MANGA_SOURCE_NETWORK_BASE_URL:https://api.mangadex.network}
manga.source.api.upload-base-url=${MANGA_SOURCE_UPLOAD_BASE_URL:https://uploads.mangadex.org}
manga.source.site.base-url=${MANGA_SOURCE_SITE_BASE_URL:https://mangadex.org}

manga.source.limits.rate-limit-delay-ms=${MANGA_SOURCE_RATE_LIMIT_DELAY_MS:210}
manga.source.limits.max-file-size-bytes=${MANGA_SOURCE_MAX_FILE_SIZE_BYTES:52428800}

manga.source.timeouts.http-timeout=${MANGA_SOURCE_HTTP_TIMEOUT:10s}
manga.source.timeouts.at-home-report-timeout=${MANGA_SOURCE_AT_HOME_REPORT_TIMEOUT:5s}

manga.source.retry.attempts=${MANGA_SOURCE_RETRY_ATTEMPTS:3}
manga.source.retry.fixed-delay=${MANGA_SOURCE_RETRY_DELAY:1s}

# Translator service (FastAPI)
translator.base-url=${TRANSLATOR_BASE_URL:http://localhost:8000}
translator.timeout=${TRANSLATOR_TIMEOUT:30s}
