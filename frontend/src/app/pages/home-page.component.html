<div class="home-page">
  <div class="home-shell">
    <header class="header">
      <h1>Manga Panel Downloader</h1>
      <p>Download and browse manga chapter panels locally.</p>
    </header>

    @if (statusLog().length > 0) {
      <section class="status-log" aria-label="Activity log">
        <h3 class="status-log-title">Activity log</h3>
        <ul class="status-list">
          @for (entry of statusLog(); track entry.at.getTime(); let i = $index) {
            <li class="status-item" [class]="entry.type">
              <span class="status-time">{{ entry.at | date:'shortTime' }}</span>
              <span class="status-text">{{ entry.text }}</span>
              <button type="button" class="status-dismiss" (click)="dismissStatus(i)" title="Dismiss">×</button>
            </li>
          }
        </ul>
      </section>
    }

    <div class="search-bar">
      <input type="text" placeholder="Manga title" #titleInput (input)="onSearchChange(titleInput.value, chapterInput.value)" />
      <input type="number" placeholder="Chapter number" #chapterInput (input)="onSearchChange(titleInput.value, chapterInput.value)" min="0" step="1" />
    </div>
    <main class="main">
      <app-download-form
        (downloaded)="onDownloaded($event)"
        (downloadError)="onDownloadError($event)"
      />
      <app-chapter-list
        [refreshTrigger]="refreshListTrigger()"
        [searchTitle]="searchTitle()"
        [searchChapter]="searchChapterNum()"
      />
    </main>
  </div>
</div>
