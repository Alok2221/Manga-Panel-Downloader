<div class="shell">
  <header class="shell-header">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-logo-inner"></div>
      </div>
      <div class="brand-text">
        <h1 class="brand-title">Manga Panel Studio</h1>
        <p class="brand-subtitle">MangaDex · Download · Read</p>
      </div>
    </div>

    <nav class="shell-nav" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active-main" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        <span>Main Page</span>
      </a>
      <a routerLink="/search" routerLinkActive="active-search" class="nav-link">
        <span>Search</span>
      </a>
      <a routerLink="/read" routerLinkActive="active-read" class="nav-link">
        <span>Read Manga</span>
      </a>
    </nav>
  </header>

  <main class="shell-main">
    <div class="shell-main-inner">
      <router-outlet />
      <section class="credits" aria-label="MangaDex credits">
        <p>
          This project uses the public
          <a href="https://mangadex.org" target="_blank" rel="noopener noreferrer">MangaDex</a>
          API. All manga data and images are provided by MangaDex and the respective scanlation groups.
          We honor content removal requests and do not serve ads or paid services.
        </p>
      </section>
    </div>
  </main>
</div>
