services:
  translator-service:
    build:
      context: ./translator-service
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_OCR: ${OPENAI_MODEL_OCR:-gpt-4o-mini}
      OPENAI_MODEL_TRANSLATE: ${OPENAI_MODEL_TRANSLATE:-gpt-4o-mini}
      TRANSLATOR_LOG_LEVEL: ${TRANSLATOR_LOG_LEVEL:-INFO}
      MAX_SEGMENTS_PER_REQUEST: ${MAX_SEGMENTS_PER_REQUEST:-100}
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mangapanel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mangapanel}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      STORAGE_PATH: /data/panels
      TRANSLATOR_BASE_URL: http://translator-service:8000
    volumes:
      - panel_storage:/data/panels
    user: "0:0"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app-frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "4200:80"
    depends_on:
      - app-backend

volumes:
  postgres_data:
  panel_storage:
